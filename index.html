<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 9 Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <div id="page1">
        <div class="arch-frame"></div>
        
        <div class="flower-corner top-left">💐</div>
        <div class="flower-corner top-right">🌸</div>
        <div class="flower-corner bottom-left">🌷</div>
        <div class="flower-corner bottom-right">🌹</div>

        <div class="center-content">
            <h2 style="color: var(--deep-red); margin-bottom: 30px; font-size: 2rem;">A special gift for you...</h2>
            <button class="main-btn" onclick="openSurprise()">Click For Surprise ✨</button>
        </div>
    </div>

    <div id="page2">
        <h1>Happy 9 Months!</h1>
        <p style="color: #666;">9 months of love, laughter, and us.</p>
        
        <div class="polaroid-stack">
            <div class="polaroid p1">
                <img src="r.jpeg" alt="Us">
                <p>My Favorite Person</p>
            </div>
            <div class="polaroid p2">
                <img src="r3.png" alt="Memory">
                <p>Pure Love</p>
            </div>
        </div>

        <div style="font-size: 2.5rem;">💐🌷🌹🌺🌹🌷💐</div>
    </div>
</body>
</html>
